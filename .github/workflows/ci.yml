name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, test and pages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          channel="$(awk -F '\"' '/^channel/ {print $2}' rust-toolchain.toml)"
          rustup toolchain install "${channel}" --profile minimal --component clippy --component rustfmt
          rustup override set "${channel}"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --tests --benches

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo test
        run: cargo test

      - name: Check personas audit
        run: cargo run -p personas-core --bin generate-persona-audit -- --check

      - name: Generate personas catalog
        run: cargo run --release -p personas-core

      - name: Verify personas catalog committed
        run: git diff --exit-code personas/catalog.json

      - name: Build pages
        run: ./scripts/build-pages.sh

      - name: Validate pages
        run: ./scripts/validate-pages.sh
