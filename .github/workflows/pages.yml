name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-pages-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and validate pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pages_artifact_id: ${{ steps.upload_pages_artifact.outputs['artifact-id'] }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          channel="$(awk -F '\"' '/^channel/ {print $2}' rust-toolchain.toml)"
          rustup toolchain install "${channel}" --profile minimal --component clippy --component rustfmt
          rustup override set "${channel}"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --tests --benches

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run personas-core tests
        run: cargo test -p personas-core

      - name: Build pages
        run: ./scripts/build-pages.sh

      - name: Validate pages
        run: ./scripts/validate-pages.sh

      - name: Package Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory ./public \
            --create \
            --file "${RUNNER_TEMP}/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude='.[^/]*' \
            .

      - name: Upload Pages artifact
        id: upload_pages_artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Verify Pages settings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type')"
          if [ "${build_type}" != "workflow" ]; then
            echo "GitHub Pages must be configured for workflow deployments, got build_type=${build_type}." >&2
            exit 1
          fi

      - name: Request Pages OIDC token
        id: oidc
        run: |
          response="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}")"

          token="$(printf '%s' "${response}" | jq -r '.value')"
          if [ -z "${token}" ] || [ "${token}" = "null" ]; then
            echo "OIDC token response did not contain a token." >&2
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "token=${token}" >> "${GITHUB_OUTPUT}"

      - name: Create Pages deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ needs.build.outputs.pages_artifact_id }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          payload="$(jq -cn \
            --argjson artifact_id "${ARTIFACT_ID}" \
            --arg build_version "${GITHUB_SHA}" \
            --arg oidc_token "${OIDC_TOKEN}" \
            '{
              artifact_id: $artifact_id,
              pages_build_version: $build_version,
              oidc_token: $oidc_token
            }')"

          response="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/pages/deployments" \
              --input - <<<"${payload}"
          )"

          deployment_id="$(printf '%s' "${response}" | jq -r '.id // (.status_url | split("/") | last) // empty')"
          page_url="$(printf '%s' "${response}" | jq -r '.page_url // empty')"

          if [ -z "${deployment_id}" ]; then
            echo "Pages deployment response did not contain an id." >&2
            exit 1
          fi

          echo "deployment_id=${deployment_id}" >> "${GITHUB_OUTPUT}"
          echo "page_url=${page_url}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        run: |
          for attempt in $(seq 1 120); do
            response="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/pages/deployments/${DEPLOYMENT_ID}")"
            status="$(printf '%s' "${response}" | jq -r '.status')"

            echo "Polling Pages deployment (attempt ${attempt}/120): ${status}"

            case "${status}" in
              succeed)
                echo "Pages deployment succeeded."
                exit 0
                ;;
              deployment_failed|deployment_perms_error|deployment_content_failed|deployment_cancelled|deployment_lost)
                echo "Pages deployment failed with status: ${status}" >&2
                exit 1
                ;;
              unknown_status|not_found|deployment_attempt_error)
                echo "Pages deployment reported transient status: ${status}"
                ;;
              *)
                echo "Pages deployment status: ${status}"
                ;;
            esac

            sleep 5
          done

          echo "Pages deployment timed out; cancelling deployment ${DEPLOYMENT_ID}." >&2
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/deployments/${DEPLOYMENT_ID}/cancel" || true
          exit 1

  verify-pages:
    name: Verify published endpoints
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Smoke test published endpoints
        run: |
          bash -euo pipefail <<'EOF'
          repo_ref="${GITHUB_REPOSITORY}"
          owner="${repo_ref%%/*}"
          repo="${repo_ref#*/}"
          owner="${owner,,}"
          repo="${repo,,}"
          base_url="https://${owner}.github.io/${repo}"

          shopt -s nullglob

          required_paths=(
            index.json
            personas.json
            scenarios.json
            entrypoint.json
            ENTRYPOINT.md
            static.json
            scenarios/index.json
          )

          for root_markdown in *.md; do
            required_paths+=("${root_markdown}")
          done

          for doc_path in docs/*.md; do
            required_paths+=("${doc_path}")
          done

          for persona_path in personas/*.md; do
            required_paths+=("${persona_path}")
          done

          for scenario_path in scenarios/*.md; do
            required_paths+=("${scenario_path}")
          done

          for script_path in scripts/*.sh; do
            required_paths+=("${script_path}")
          done

          for workflow_path in .github/workflows/*.yml; do
            required_paths+=("workflows/$(basename "${workflow_path}")")
          done

          sleep 10

          for path in "${required_paths[@]}"; do
            echo "Validating ${base_url}/${path}"
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location "${base_url}/${path}" > /dev/null; then
                echo "  OK on attempt ${attempt}"
                break
              fi
              if [ "${attempt}" -eq 5 ]; then
                echo "  Failed after ${attempt} attempts" >&2
                exit 1
              fi
              sleep 5
            done
          done
          EOF
