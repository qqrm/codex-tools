name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-pages-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and validate pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          channel="$(awk -F '\"' '/^channel/ {print $2}' rust-toolchain.toml)"
          rustup toolchain install "${channel}" --profile minimal --component clippy --component rustfmt
          rustup override set "${channel}"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --tests --benches

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run personas-core tests
        run: cargo test -p personas-core

      - name: Build pages
        run: ./scripts/build-pages.sh

      - name: Validate pages
        run: ./scripts/validate-pages.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./public

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  verify-pages:
    name: Verify published endpoints
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Smoke test published endpoints
        run: |
          bash -euo pipefail <<'EOF'
          repo_ref="${GITHUB_REPOSITORY}"
          owner="${repo_ref%%/*}"
          repo="${repo_ref#*/}"
          owner="${owner,,}"
          repo="${repo,,}"
          base_url="https://${owner}.github.io/${repo}"

          shopt -s nullglob

          required_paths=(
            index.json
            personas.json
            scenarios.json
            entrypoint.json
            ENTRYPOINT.md
            static.json
            scenarios/index.json
          )

          for root_markdown in *.md; do
            required_paths+=("${root_markdown}")
          done

          for doc_path in docs/*.md; do
            required_paths+=("${doc_path}")
          done

          for persona_path in personas/*.md; do
            required_paths+=("${persona_path}")
          done

          for scenario_path in scenarios/*.md; do
            required_paths+=("${scenario_path}")
          done

          for script_path in scripts/*.sh; do
            required_paths+=("${script_path}")
          done

          for workflow_path in .github/workflows/*.yml; do
            required_paths+=("workflows/$(basename "${workflow_path}")")
          done

          sleep 10

          for path in "${required_paths[@]}"; do
            echo "Validating ${base_url}/${path}"
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location "${base_url}/${path}" > /dev/null; then
                echo "  OK on attempt ${attempt}"
                break
              fi
              if [ "${attempt}" -eq 5 ]; then
                echo "  Failed after ${attempt} attempts" >&2
                exit 1
              fi
              sleep 5
            done
          done
          EOF
